<html>
    <title>Young Technicians Academy Workshop 2025 - Murray Galbraith Lighting Design</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link id="style_sheet" rel="stylesheet" href="main.css">
    <header>
        <iframe src="header"></iframe>
    </header>
    <body>
        <div id="black_transition"></div>
        <script>
            var black_transition_int = 100;
            function update_black_transition_int() {
                black_transition_int = black_transition_int - 1;
                document.getElementById("black_transition").style.opacity = black_transition_int + "%";
                if (black_transition_int <= 0) {
                    document.getElementById("black_transition").style.left = "-10000px";
                }
                else {
                    setTimeout(update_black_transition_int, 8);
                }
            }
            update_black_transition_int();
        </script>
        <div id="vertical_padding" style="height: 200px"></div>
        <script>
            if (window.innerWidth < window.innerHeight) {
                document.getElementById("vertical_padding").style.display = "block";
            }
            else {
                document.getElementById("vertical_padding").style.display = "none";
            }
        </script>
        <div>
            <table>
                <tr>
                    <td width="20%"><image class="image_circle" src="portfolio/youngtechniciansacademysliveeventsworkshop2025/liveeventsworkshop2025_thumbnail.png"></image></td>
                    <td width="80%">
                        <table>
                            <tr>
                                <td><h1>Young Technicians Academy Workshop 2025</h1></td>
                            </tr>
                            <tr>
                                <td><h2>📍 Yaxely, UK</h2></td>
                            </tr>
                            <tr>
                                <td><h2>📆 April/25</h2></td>
                            </tr>
                            <tr>
                                <table style="margin-top: -25px">
                                    <tr>
                                        <td><h2>Live events</h2></td>
                                        <td><h2>Teaching</h2></td>
                                        <td><h2>#productionfutures</h2></td>
                                    </tr>
                                </table>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </div>
        <div>
            <p>Over 3 days me and a team of people planned, built and ran a small music gig. On the day of the show, the team was split into groups which ran lighting and sound (I did lighting 😁).</p>
        </div>
        <div>
            <image class="image_all" src="portfolio/youngtechniciansacademysliveeventsworkshop2025/youngtechniciansacademysliveeventsworkshop2025_all.png"></image>
        </div>
    </body>
    <footer>
        <iframe class="iframe_footer" src="footer"></iframe>
    </footer>
    <script>
        function update_for_phone() {
            if (window.outerWidth < window.outerHeight) {
                document.getElementById("style_sheet").href = "vertical.css";
            };
        }
        update_for_phone();
    </script>
</html>
