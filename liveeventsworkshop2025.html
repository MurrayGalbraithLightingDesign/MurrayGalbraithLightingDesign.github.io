        <div id="contactshortcut" style="position: fixed; top: 1000px; left: 0px">

            <script>
                function update_top() {
                    if (document.getElementById("contactshortcut").offsetTop > (window.innerHeight - 225)) {
                        document.getElementById("contactshortcut").style.top = document.getElementById("contactshortcut").offsetTop - ((document.getElementById("contactshortcut").offsetTop - (window.innerHeight - 225)) / 10) + "px";
                    };
                    setTimeout(update_top, 10);
                }
                setTimeout(update_top, 1000);
                document.getElementById("contactshortcut").style.left = (window.innerWidth - 150) + "px";
